# ============================================
# SQUID PROXY CONFIGURATION
# Projet : Monitoring Trafic Web
# OS : Ubuntu 22.04 LTS
# ============================================

# --- Port d'écoute
http_port 3128

# --- Nom du cache
cache_mgr admin@monreseau.local
visible_hostname proxy.monreseau.local

# ============================================
# LISTES DE CONTRÔLE D'ACCÈS (ACL)
# ============================================

# Réseau local autorisé
acl localnet src 192.168.1.0/24
acl localnet src 10.0.0.0/8

# Ports autorisés
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 21
acl Safe_ports port 8080

# Méthode CONNECT (HTTPS tunneling)
acl CONNECT method CONNECT

# Sites bloqués (liste noire)
acl blocked_sites dstdomain "/etc/squid/blocked_sites.txt"

# Catégories de sites
acl social_media dstdomain .facebook.com .instagram.com .tiktok.com .twitter.com
acl streaming     dstdomain .youtube.com .netflix.com .twitch.tv
acl work_hours    time MTWHF 08:00-18:00

# ============================================
# RÈGLES D'ACCÈS
# ============================================

# Bloquer les ports non sûrs
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Bloquer sites interdits
http_access deny blocked_sites

# Bloquer réseaux sociaux pendant les heures de travail
http_access deny social_media work_hours

# Autoriser le réseau local
http_access allow localnet

# Bloquer tout le reste
http_access deny all

# ============================================
# CACHE CONFIGURATION
# ============================================
cache_dir ufs /var/spool/squid 1000 16 256
maximum_object_size 50 MB
cache_mem 256 MB

# ============================================
# LOGS
# ============================================
access_log /var/log/squid/access.log squid
cache_log  /var/log/squid/cache.log
logfile_rotate 7

# Format de log personnalisé
logformat custom %tl %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt

# ============================================
# DNS
# ============================================
dns_nameservers 8.8.8.8 1.1.1.1
